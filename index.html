<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <aside class="sidebar">
    <h2>Dashboard</h2>
    <ul>
      <li>🏠 หน้าแรก</li>
      <li>📊 สถิติ</li>
      <li>👤 ผู้ใช้</li>
      <li>⚙️ ตั้งค่า</li>
    </ul>
  </aside>

  <main class="main">
    <header>
      <button id="menuBtn">☰</button>
      <h1>แดชบอร์ด</h1>
      <button id="themeBtn">🌙</button>
    </header>

    <section class="cards">
      <div class="card">
        <h3>ผู้ใช้งาน</h3>
        <p>1,245</p>
      </div>
      <div class="card">
        <h3>ยอดขาย</h3>
        <p>฿52,300</p>
      </div>
      <div class="card">
        <h3>คำสั่งซื้อ</h3>
        <p>320</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
